<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="css/style.css"
    />
    <title>World Clock - Paula Bayerri</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>
      <select>
        <option value="">Select a city...</option>
        <option value="">Barcelona</option>
        <option value="">New York</option>
        <option value="">Tokyo</option>
      </select>
      <div class="city">
        <div>
          <h2>London 🇬🇧</h2>
          <div class="date">March 31st 2026</div>
        </div>
        <div class="time">05:47:00 <small>PM</small></div>
      </div>
      <div class="city">
        <div>
          <h2>Cape Town 🇿🇦</h2>
          <div class="date">March 31st 2026</div>
        </div>
        <div class="time">05:47:00 <small>PM</small></div>
      </div>
    </div>

    <footer>
      This project was coded by
      <a
        href="https://github.com/pbayerri"
        target="_blank"
        ><strong>Paula Bayerri</strong></a
      >
      and it is
      <a
        href="https://github.com/pbayerri/world-clock"
        target="_blank"
        >open sourced on GitHub</a
      >.
    </footer>
    <script src="javascript/index.js"></script>
  </body>
</html>
