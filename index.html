<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="css/style.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>World Clock - Paula Bayerri</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>
      <select id="city">
        <option value="">Select a city...</option>
        <option value="current">My current location</option>
        <option value="Pacific/Honolulu">Honolulu</option>
        <option value="America/New_York">New York</option>
        <option value="America/Chihuahua">Chihuahua</option>
        <option value="Atlantic/Reykjavik">Reykjavik</option>
        <option value="Antarctica/South_Pole">South Pole</option>
        <option value="Europe/Madrid">Madrid</option>
        <option value="Africa/Nairobi">Nairobi</option>
        <option value="Asia/Bangkok">Bangkok</option>
        <option value="Asia/Hong_Kong">Hong Kong</option>
        <option value="Asia/Seoul">Seoul</option>
        <option value="Pacific/Fiji">Fiji</option>
      </select>
      <div id="cities">
        <div
          class="city"
          id="vancouver"
        >
          <div>
            <h2>Vancouver 🇨🇦</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
        <div
          class="city"
          id="buenos-aires"
        >
          <div>
            <h2>Buenos Aires 🇦🇷</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
        <div
          class="city"
          id="london"
        >
          <div>
            <h2>London 🇬🇧</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
        <div
          class="city"
          id="cairo"
        >
          <div>
            <h2>Cairo 🇪🇬</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
        <div
          class="city"
          id="tokyo"
        >
          <div>
            <h2>Tokyo 🇯🇵</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
      </div>
    </div>

    <footer>
      This project was coded with 🩷 by
      <strong>Paula Bayerri</strong>
      and it is
      <a
        href="https://github.com/pbayerri/world-clock"
        target="_blank"
        >open sourced on GitHub</a
      >.
    </footer>
    <script src="javascript/index.js"></script>
  </body>
</html>
